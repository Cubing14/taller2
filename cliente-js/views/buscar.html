<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscar Vehículo Eléctrico</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <h1>🔍 Buscar Vehículo Eléctrico</h1>
  <form id="formBuscar">
    <label>ID: <input type="number" id="id" required></label>
    <button type="submit">Buscar</button>
  </form>
  <div id="resultado"></div>
  <a href="../index.html">Volver al Inicio</a>

  <script type="module">
    import { VehiculoController } from '../controllers/VehiculoController.js';

    const controller = new VehiculoController();
    const form = document.getElementById('formBuscar');
    const resultado = document.getElementById('resultado');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const result = await controller.buscarElectrico(document.getElementById('id').value);
      if (result.ok) {
        const auto = result.data;
        resultado.innerHTML = `
          <h2>Información del Vehículo</h2>
          <p>ID: ${auto.id}</p>
          <p>Marca: ${auto.marca}</p>
          <p>Modelo: ${auto.modelo}</p>
          <p>Año: ${auto.anio}</p>
          <p>Autonomía: ${auto.autonomiaKm} km</p>
          <p>Fecha Registro: ${new Date(auto.fechaRegistro).toLocaleString()}</p>
          <h3>Baterías:</h3>
          <ul>
            ${auto.baterias.map(b => `
              <li>Tipo: ${b.tipo}, Capacidad: ${b.capacidadKwh} kWh, Ciclos: ${b.ciclosVida}, Fecha: ${new Date(b.fechaInstalacion).toLocaleString()}, Estado: ${b.estado}</li>
            `).join('')}
          </ul>
        `;
      } else {
        resultado.textContent = result.mensaje;
      }
    });
  </script>
</body>
</html>
