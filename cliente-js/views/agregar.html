<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Agregar Vehículo Eléctrico</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
  <h1>➕ Agregar Vehículo Eléctrico</h1>
  <form id="formAgregar">
    <label>Marca: <input type="text" id="marca" required></label><br>
    <label>Modelo: <input type="text" id="modelo" required></label><br>
    <label>Año: <input type="number" id="anio" required></label><br>
    <label>Autonomía (km): <input type="number" step="0.1" id="autonomia" required></label><br>
    <h3>Baterías</h3>
    <div id="bateriasContainer">
      <div class="bateria">
        <label>Tipo: <input type="text" name="tipo" required></label>
        <label>Capacidad (kWh): <input type="number" step="0.1" name="capacidad" required></label>
        <label>Ciclos de Vida: <input type="number" name="ciclos" required></label>
        <label>Fecha Instalación: <input type="datetime-local" name="fecha" required></label>
        <label>Estado: <input type="text" name="estado" required></label>
        <button type="button" onclick="removerBateria(this)">Remover</button>
      </div>
    </div>
    <button type="button" onclick="agregarBateria()">Agregar Batería</button><br><br>
    <button type="submit">Guardar</button>
  </form>
  <div id="mensaje"></div>
  <a href="../index.html">Volver al Inicio</a>

  <script type="module">
    import { VehiculoController } from '../controllers/VehiculoController.js';

    const controller = new VehiculoController();
    const form = document.getElementById('formAgregar');
    const mensaje = document.getElementById('mensaje');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const baterias = Array.from(document.querySelectorAll('.bateria')).map(div => ({
        tipo: div.querySelector('[name=tipo]').value.trim(),
        capacidadKwh: parseFloat(div.querySelector('[name=capacidad]').value),
        ciclosVida: parseInt(div.querySelector('[name=ciclos]').value),
        fechaInstalacion: div.querySelector('[name=fecha]').value,
        estado: div.querySelector('[name=estado]').value.trim()
      }));
      const result = await controller.agregarElectrico(
        document.getElementById('marca').value,
        document.getElementById('modelo').value,
        document.getElementById('anio').value,
        document.getElementById('autonomia').value,
        baterias
      );
      mensaje.textContent = result.mensaje;
      if (result.ok) form.reset();
    });

    function agregarBateria() {
      const container = document.getElementById('bateriasContainer');
      const div = document.createElement('div');
      div.className = 'bateria';
      div.innerHTML = `
        <label>Tipo: <input type="text" name="tipo" required></label>
        <label>Capacidad (kWh): <input type="number" step="0.1" name="capacidad" required></label>
        <label>Ciclos de Vida: <input type="number" name="ciclos" required></label>
        <label>Fecha Instalación: <input type="datetime-local" name="fecha" required></label>
        <label>Estado: <input type="text" name="estado" required></label>
        <button type="button" onclick="removerBateria(this)">Remover</button>
      `;
      container.appendChild(div);
    }

    window.agregarBateria = agregarBateria;
    window.removerBateria = (btn) => btn.parentElement.remove();
  </script>
</body>
</html>
